<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Subtitle Review</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #141414; color: #f4f4f4; }
    main { display: grid; grid-template-columns: minmax(0, 1fr) 380px; min-height: 100vh; }
    .stage { display: grid; place-items: center; padding: 24px; }
    .frame { position: relative; width: min(100%, 1180px); aspect-ratio: 16 / 9; background: #000; overflow: hidden; border-radius: 6px; }
    .frame img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .subtitle { position: absolute; left: 7%; right: 7%; bottom: 5%; display: grid; gap: 8px; text-align: center; text-shadow: 0 2px 3px #000; }
    .subtitle-line { display: none; }
    .subtitle-line span { display: inline; padding: 0.08em 0.35em; background: rgba(0, 0, 0, 0.58); box-decoration-break: clone; -webkit-box-decoration-break: clone; }
    .subtitle-line mark { padding: 0.02em 0.12em; border-radius: 3px; background: rgba(196, 44, 44, 0.9); color: #fff; }
    .subtitle-line.visible { display: block; }
    .subtitle-line.original { font-size: clamp(16px, 2vw, 30px); line-height: 1.2; font-weight: 650; }
    .subtitle-line.target { font-size: clamp(22px, 3vw, 44px); line-height: 1.25; font-weight: 750; }
    aside { border-left: 1px solid #303030; padding: 16px; display: grid; grid-template-rows: auto auto auto 1fr auto auto; gap: 12px; background: #1f1f1f; }
    .meta { display: grid; gap: 4px; color: #cfcfcf; font-size: 14px; }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; }
    .search { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .search input { min-width: 0; border: 1px solid #555; border-radius: 6px; padding: 8px 10px; background: #101010; color: #fff; }
    .search .wide { grid-column: 1 / -1; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    #searchStatus { color: #cfcfcf; font-size: 12px; }
    button { border: 1px solid #555; background: #2b2b2b; color: #fff; border-radius: 6px; padding: 8px 10px; cursor: pointer; }
    button:hover { background: #383838; }
    textarea { width: 100%; height: 100%; min-height: 280px; resize: none; border: 1px solid #555; border-radius: 6px; padding: 12px; background: #101010; color: #fff; font: 18px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; }
    #prompt { height: 92px; min-height: 92px; font-size: 15px; }
    audio { width: 100%; }
    .risks { display: flex; gap: 6px; flex-wrap: wrap; min-height: 24px; }
    .risk { padding: 3px 7px; border-radius: 999px; background: #593737; color: #ffdada; font-size: 12px; }
    input[type="range"] { width: 100%; }
    .lists { display: grid; gap: 8px; }
    .list-title { color: #cfcfcf; font-size: 12px; font-weight: 700; text-transform: uppercase; }
    .list { overflow: auto; border: 1px solid #333; border-radius: 6px; max-height: 220px; }
    #riskList { max-height: 150px; }
    #blockList { max-height: 170px; }
    .cue { padding: 8px 10px; border-bottom: 1px solid #333; cursor: pointer; color: #cfcfcf; }
    .cue.active { background: #31475f; color: #fff; }
    .cue .cue-risks { display: block; color: #ffb4b4; font-size: 12px; margin-top: 3px; }
    .block { padding: 8px 10px; border-bottom: 1px solid #333; cursor: pointer; color: #cfcfcf; }
    .block.active { background: #4a3f2a; color: #fff; }
    .block-meta { display: block; color: #aaa; font-size: 12px; margin-top: 3px; }
    .block-source { max-height: 90px; overflow: auto; border: 1px solid #333; border-radius: 6px; padding: 8px; background: #151515; color: #ddd; font-size: 13px; line-height: 1.4; }
    #blockTarget, #blockSpeech, #blockNote { min-height: 64px; height: 64px; font-size: 14px; }
    #blockPanel[hidden] { display: none; }
    @media (max-width: 900px) { main { grid-template-columns: 1fr; } aside { border-left: 0; border-top: 1px solid #303030; } }
  </style>
</head>
<body>
  <main>
    <section class="stage">
      <div class="frame">
        <img id="image" alt="">
        <div class="subtitle">
          <div id="originalLine" class="subtitle-line original"><span id="originalOverlay"></span></div>
          <div class="subtitle-line target visible"><span id="overlay"></span></div>
        </div>
      </div>
    </section>
    <aside>
      <div class="meta">
        <strong id="counter">Loading</strong>
        <span id="timing"></span>
        <span id="scene"></span>
      </div>
      <div>
        <input id="slider" type="range" min="0" max="0" value="0">
      </div>
      <div>
        <audio id="audio" controls></audio>
        <div id="risks" class="risks"></div>
      </div>
      <textarea id="editor" spellcheck="false"></textarea>
      <textarea id="prompt" spellcheck="false" placeholder="Prompt note for this cue"></textarea>
      <div>
        <div class="search">
          <input id="searchTerm" type="search" placeholder="Search subtitles">
          <input id="replaceTerm" type="text" placeholder="Replace with">
          <div class="wide">
            <button id="findNext">Find Next</button>
            <button id="replaceAll">Replace All</button>
            <span id="searchStatus"></span>
          </div>
        </div>
        <div class="controls">
          <button id="prev">←</button>
          <button id="next">→</button>
          <button id="play">Play Cue</button>
          <button id="downloadSrt">Download SRT</button>
          <button id="downloadChanges">Download Changes</button>
          <button id="downloadJson">Download JSON</button>
        </div>
        <div class="lists">
          <div id="blockPanel" hidden>
            <div class="list-title">Blocks <span id="blockStatus"></span></div>
            <div id="blockList" class="list"></div>
            <div id="blockSource" class="block-source"></div>
            <textarea id="blockTarget" spellcheck="false" placeholder="Block target text"></textarea>
            <textarea id="blockSpeech" spellcheck="false" placeholder="Block speech text"></textarea>
            <textarea id="blockNote" spellcheck="false" placeholder="Block note: merge / split / rewrite"></textarea>
            <div class="controls">
              <button id="approveBlock">Approve Block</button>
              <button id="downloadBlockDecisions">Download Block Decisions</button>
            </div>
          </div>
          <div>
            <div class="list-title">Risk Cues</div>
            <div id="riskList" class="list"></div>
          </div>
          <div>
            <div class="list-title">All Cues</div>
            <div id="list" class="list"></div>
          </div>
        </div>
      </div>
    </aside>
  </main>
  <script>
    let data, semanticBlocks, index = 0, blockIndex = 0, blockDecisions = {};
    const $ = (id) => document.getElementById(id);
    const storeKey = () => `subtitle-review:${location.pathname}`;
    const blockStoreKey = () => `subtitle-review-blocks:${location.pathname}`;

    function srtTime(seconds) {
      const ms = Math.round(seconds * 1000);
      const h = String(Math.floor(ms / 3600000)).padStart(2, "0");
      const m = String(Math.floor(ms % 3600000 / 60000)).padStart(2, "0");
      const s = String(Math.floor(ms % 60000 / 1000)).padStart(2, "0");
      const x = String(ms % 1000).padStart(3, "0");
      return `${h}:${m}:${s},${x}`;
    }

    function renderList() {
      $("list").innerHTML = data.cues.map((cue, i) =>
        `<div class="cue ${i === index ? "active" : ""}" data-i="${i}">${cue.id}. ${cue.text.replaceAll("<", "&lt;")}</div>`
      ).join("");
      $("riskList").innerHTML = data.cues.map((cue, i) => ({ cue, i }))
        .filter((row) => (row.cue.pronunciation_risks || []).length)
        .map((row) =>
          `<div class="cue ${row.i === index ? "active" : ""}" data-i="${row.i}">${row.cue.id}. ${escapeHtml(row.cue.text)}<span class="cue-risks">${row.cue.pronunciation_risks.join(" / ")}</span></div>`
        ).join("");
      document.querySelectorAll(".cue").forEach((el) => {
        el.onclick = () => go(Number(el.dataset.i));
      });
      renderBlocks();
    }

    function escapeHtml(text) {
      return text.replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
    }

    function markedText(text, risks) {
      let html = escapeHtml(text);
      const terms = (risks || []).filter((risk) => !["英文混中文", "數字"].includes(risk));
      terms.sort((a, b) => b.length - a.length).forEach((term) => {
        html = html.replaceAll(escapeHtml(term), `<mark>${escapeHtml(term)}</mark>`);
      });
      return html;
    }

    function go(next) {
      index = Math.max(0, Math.min(data.cues.length - 1, next));
      const cue = data.cues[index];
      const scene = data.scenes.find((row) => row.id === cue.scene_id) || data.scenes[0];
      const hasOriginal = Boolean(cue.original_text);
      $("image").src = scene.image;
      $("originalLine").classList.toggle("visible", hasOriginal);
      $("originalOverlay").textContent = cue.original_text || "";
      $("overlay").innerHTML = markedText(cue.text, cue.pronunciation_risks);
      $("audio").src = cue.audio || "";
      $("audio").style.display = cue.audio ? "block" : "none";
      $("risks").innerHTML = (cue.pronunciation_risks || []).map((risk) => `<span class="risk">${risk}</span>`).join("");
      $("editor").value = cue.text;
      $("prompt").value = cue.prompt_note || "";
      $("counter").textContent = `${index + 1} / ${data.cues.length}`;
      $("timing").textContent = `${srtTime(cue.start)} → ${srtTime(cue.end)}`;
      $("scene").textContent = `scene ${scene.id}: ${srtTime(scene.start)} → ${srtTime(scene.end)}`;
      $("slider").value = index;
      renderList();
      syncBlockToCue(cue.id);
      document.querySelector(".cue.active")?.scrollIntoView({ block: "nearest" });
    }

    function saveDraft() {
      localStorage.setItem(storeKey(), JSON.stringify(data.cues.map((cue) => ({
        text: cue.text,
        prompt_note: cue.prompt_note || "",
      }))));
    }

    function download(name, type, text) {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([text], { type }));
      a.download = name;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function srtText() {
      return data.cues.map((cue, i) =>
        `${i + 1}\n${srtTime(cue.start)} --> ${srtTime(cue.end)}\n${cue.text}\n`
      ).join("\n");
    }

    function changesText() {
      const changes = data.cues.filter((cue) =>
        cue.text !== cue.source_text || (cue.prompt_note || "").trim()
      ).map((cue) => ({
        id: cue.id,
        start: srtTime(cue.start),
        end: srtTime(cue.end),
        original_subtitle: cue.source_text,
        updated_subtitle: cue.text,
        prompt_note: cue.prompt_note || "",
      }));
      return JSON.stringify(changes, null, 2);
    }

    function blockDecision(block) {
      if (!blockDecisions[block.id]) {
        blockDecisions[block.id] = {
          id: block.id,
          source_cue_ids: block.source_cue_ids || [],
          target_text: block.target_text || "",
          speech_text: block.speech_text || "",
          note: "",
          decision: "",
        };
      }
      return blockDecisions[block.id];
    }

    function saveBlockDecisions() {
      localStorage.setItem(blockStoreKey(), JSON.stringify(blockDecisions));
    }

    function blockCueIds(block) {
      return block.input_ids || block.source_cue_ids || [];
    }

    function syncBlockToCue(cueId) {
      if (!semanticBlocks) return;
      const found = semanticBlocks.blocks.findIndex((block) => blockCueIds(block).includes(cueId));
      if (found >= 0 && found !== blockIndex) {
        blockIndex = found;
        renderBlocks();
      }
    }

    function goBlock(next) {
      if (!semanticBlocks) return;
      blockIndex = Math.max(0, Math.min(semanticBlocks.blocks.length - 1, next));
      const firstCueId = blockCueIds(semanticBlocks.blocks[blockIndex])[0];
      const cueIndex = data.cues.findIndex((cue) => cue.id === firstCueId);
      if (cueIndex >= 0) go(cueIndex);
      renderBlocks();
    }

    function renderBlocks() {
      if (!semanticBlocks) return;
      $("blockPanel").hidden = false;
      $("blockStatus").textContent = `${blockIndex + 1}/${semanticBlocks.blocks.length}`;
      $("blockList").innerHTML = semanticBlocks.blocks.map((block, i) => {
        const decision = blockDecisions[block.id]?.decision || "";
        const text = escapeHtml(block.target_text || "(empty)");
        const meta = `${block.id} · ${(block.budget_ms / 1000).toFixed(1)}s · ${(block.source_cue_ids || []).join(",")}${decision ? " · " + decision : ""}`;
        return `<div class="block ${i === blockIndex ? "active" : ""}" data-i="${i}">${text}<span class="block-meta">${escapeHtml(meta)}</span></div>`;
      }).join("");
      document.querySelectorAll(".block").forEach((el) => {
        el.onclick = () => goBlock(Number(el.dataset.i));
      });
      const block = semanticBlocks.blocks[blockIndex];
      const decision = blockDecision(block);
      $("blockSource").textContent = block.source_text || "";
      $("blockTarget").value = decision.target_text;
      $("blockSpeech").value = decision.speech_text;
      $("blockNote").value = decision.note || "";
      document.querySelector(".block.active")?.scrollIntoView({ block: "nearest" });
    }

    function updateCurrentBlock() {
      if (!semanticBlocks) return;
      const block = semanticBlocks.blocks[blockIndex];
      const decision = blockDecision(block);
      decision.target_text = $("blockTarget").value;
      decision.speech_text = $("blockSpeech").value;
      decision.note = $("blockNote").value;
      saveBlockDecisions();
    }

    function blockDecisionText() {
      return JSON.stringify({
        workflow: "framecue_block_decisions_v1",
        decisions: Object.values(blockDecisions),
      }, null, 2);
    }

    function searchMatches() {
      const term = $("searchTerm").value;
      if (!term) return [];
      return data.cues.map((cue, i) => cue.text.includes(term) ? i : -1).filter((i) => i >= 0);
    }

    function updateSearchStatus(message) {
      if (message) {
        $("searchStatus").textContent = message;
        return;
      }
      const term = $("searchTerm").value;
      if (!term) {
        $("searchStatus").textContent = "";
        return;
      }
      $("searchStatus").textContent = `${searchMatches().length} matches`;
    }

    function findNextMatch() {
      const matches = searchMatches();
      if (!matches.length) {
        updateSearchStatus("0 matches");
        return;
      }
      const next = matches.find((i) => i > index) ?? matches[0];
      go(next);
      updateSearchStatus(`${matches.indexOf(next) + 1} / ${matches.length}`);
    }

    function replaceAllMatches() {
      const term = $("searchTerm").value;
      if (!term) {
        updateSearchStatus("");
        return;
      }
      const replacement = $("replaceTerm").value;
      let count = 0;
      data.cues.forEach((cue) => {
        if (!cue.text.includes(term)) return;
        cue.text = cue.text.split(term).join(replacement);
        count += 1;
      });
      saveDraft();
      go(index);
      updateSearchStatus(`replaced ${count}`);
    }

    $("editor").addEventListener("input", () => {
      data.cues[index].text = $("editor").value;
      $("overlay").innerHTML = markedText(data.cues[index].text, data.cues[index].pronunciation_risks);
      saveDraft();
    });
    $("prompt").addEventListener("input", () => {
      data.cues[index].prompt_note = $("prompt").value;
      saveDraft();
    });
    $("blockTarget").addEventListener("input", updateCurrentBlock);
    $("blockSpeech").addEventListener("input", updateCurrentBlock);
    $("blockNote").addEventListener("input", updateCurrentBlock);
    $("slider").addEventListener("input", () => go(Number($("slider").value)));
    $("searchTerm").addEventListener("input", () => updateSearchStatus());
    $("findNext").onclick = findNextMatch;
    $("replaceAll").onclick = replaceAllMatches;
    $("prev").onclick = () => go(index - 1);
    $("next").onclick = () => go(index + 1);
    function toggleAudio() {
      const audio = $("audio");
      if (!audio.src) return;
      if (audio.paused) {
        audio.play();
      } else {
        audio.pause();
      }
    }

    $("play").onclick = toggleAudio;
    $("downloadSrt").onclick = () => download("edited_subtitles.srt", "application/x-subrip", srtText());
    $("downloadChanges").onclick = () => download("subtitle_change_list.json", "application/json", changesText());
    $("downloadJson").onclick = () => download("edited_review_package.json", "application/json", JSON.stringify(data, null, 2));
    $("approveBlock").onclick = () => {
      const block = semanticBlocks.blocks[blockIndex];
      blockDecision(block).decision = "approved";
      saveBlockDecisions();
      renderBlocks();
    };
    $("downloadBlockDecisions").onclick = () => download("block_decisions.json", "application/json", blockDecisionText());
    document.addEventListener("keydown", (event) => {
      if (["INPUT", "TEXTAREA"].includes(event.target.tagName)) return;
      if (["ArrowLeft", "ArrowUp"].includes(event.key)) go(index - 1);
      if (["ArrowRight", "ArrowDown"].includes(event.key)) go(index + 1);
      if (event.key === " ") {
        event.preventDefault();
        toggleAudio();
      }
    });

    fetch("review_package.json").then((res) => res.json()).then((loaded) => {
      data = loaded;
      const draft = JSON.parse(localStorage.getItem(storeKey()) || "null");
      if (draft && draft.length === data.cues.length) {
        data.cues.forEach((cue, i) => {
          cue.source_text = cue.text;
          if (typeof draft[i] === "string") {
            cue.text = draft[i];
          } else {
            cue.text = draft[i].text;
            cue.prompt_note = draft[i].prompt_note || "";
          }
        });
      } else {
        data.cues.forEach((cue) => cue.source_text = cue.text);
      }
      $("slider").max = data.cues.length - 1;
      go(0);
    });
    fetch("semantic_blocks/semantic_blocks.json").then((res) => res.ok ? res.json() : null).then((loaded) => {
      if (!loaded) return;
      semanticBlocks = loaded;
      blockDecisions = JSON.parse(localStorage.getItem(blockStoreKey()) || "{}");
      renderBlocks();
    }).catch(() => {});
  </script>
</body>
</html>
